name: Deploy Zensical to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Validate headings
        run: python scripts/validate_headings.py
      - name: Build site
        run: zensical build --strict
      - name: Enrich breadcrumb schema
        run: python scripts/enrich_breadcrumb_schema.py --site site
      - name: Generate sitemap.xml
        run: python scripts/generate_sitemap.py --site site --output site/sitemap.xml
      - name: Generate updates.json
        run: python scripts/generate_updates.py
      - name: Copy root-level files
        run: |
          cp robots.txt site/
          cp llms.txt site/
          cp llms-full.txt site/
      - name: Validate SEO contract
        run: python scripts/validate_seo.py --docs docs --site site --sitemap site/sitemap.xml
      - name: Verify build
        run: |
          test -f site/index.html || { echo "Error: site/index.html not found"; exit 1; }
          test -f site/sitemap.xml || { echo "Error: site/sitemap.xml not found"; exit 1; }
          test -f site/robots.txt || { echo "Error: site/robots.txt not found"; exit 1; }
          test -f site/llms.txt || { echo "Error: site/llms.txt not found"; exit 1; }
          test -f site/llms-full.txt || { echo "Error: site/llms-full.txt not found"; exit 1; }
          test -f site/updates.json || { echo "Error: site/updates.json not found"; exit 1; }
          echo "Build verification passed"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
